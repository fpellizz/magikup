apiVersion: v1
kind: ConfigMap
metadata:
  name: magikup-config
  labels:
    app: magikup
data:
  config.ini: |
    [settings]
    backup_dir = /backups
    pg_dump_path = /usr/bin/pg_dump
    pg_restore_path = /usr/bin/pg_restore
    max_upload_size_gb = 5
    context_path =

    [auth]
    session_timeout_minutes = 480

    [query]
    autocommit = false

    [aws:default]
    access_key_id =
    secret_access_key =
    region = us-east-1

    [jumphosts]
    # Format: alias = instance_id
    # Example: production-jh = i-0123456789abcdef0

    [endpoints]
    # Format: name = host|port|username|password|use_ssm|jumphost_alias
    # Example: prod-db = aurora-cluster.rds.amazonaws.com|5432|admin|password|true|production-jh
    # Example: local-db = 10.0.1.100|5432|postgres|password|false|
