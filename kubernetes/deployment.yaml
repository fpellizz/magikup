apiVersion: apps/v1
kind: Deployment
metadata:
  name: magikup
  labels:
    app: magikup
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: magikup
  template:
    metadata:
      labels:
        app: magikup
    spec:
      serviceAccountName: magikup
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: init-config
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              if [ ! -f /app-config/config.ini ]; then
                echo "Copying initial config..."
                cp /configmap/config.ini /app-config/config.ini
              else
                echo "Config already exists, skipping..."
              fi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config-volume
              mountPath: /app-config
            - name: configmap-volume
              mountPath: /configmap

      containers:
        - name: app
          image: ghcr.io/fpellizz/magikup:3.3.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
              name: http
          env:
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: magikup-secret
                  key: ENCRYPTION_KEY
            # Context path for reverse proxy deployment (e.g., /magikup)
            # - name: ROOT_PATH
            #   value: "/magikup"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: backup-volume
              mountPath: /backups
            - name: config-volume
              mountPath: /app/config
            - name: logs-volume
              mountPath: /app/logs
            - name: tmp-volume
              mountPath: /tmp
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      volumes:
        - name: backup-volume
          persistentVolumeClaim:
            claimName: magikup-backups
        - name: config-volume
          persistentVolumeClaim:
            claimName: magikup-config
        - name: logs-volume
          persistentVolumeClaim:
            claimName: magikup-logs
        - name: configmap-volume
          configMap:
            name: magikup-config
            items:
              - key: config.ini
                path: config.ini
        - name: tmp-volume
          emptyDir:
            sizeLimit: 100Mi
