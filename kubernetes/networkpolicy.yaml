apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: magikup
  labels:
    app: magikup
spec:
  podSelector:
    matchLabels:
      app: magikup
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic only from the ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow PostgreSQL connections (direct)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # Block metadata endpoint
      ports:
        - protocol: TCP
          port: 5432
    # Allow HTTPS outbound (AWS API, SSM)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 443
